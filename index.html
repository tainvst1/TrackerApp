<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --panel: #111418;
    --border: #1e2530;
    --accent: #00ff88;
    --accent2: #00bfff;
    --warn: #ff6b35;
    --text: #cdd6e0;
    --muted: #4a5568;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Barlow', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* LOGIN SCREEN */
  #login-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    padding: 2rem;
    gap: 0;
  }

  .login-box {
    width: 100%;
    max-width: 340px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    padding: 2rem;
  }

  .login-logo {
    font-family: var(--mono);
    font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: 0.2em;
    margin-bottom: 0.25rem;
  }

  .login-sub {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 2rem;
  }

  .login-label {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    display: block;
  }

  .login-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 1rem;
    padding: 0.75rem 1rem;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 1.5rem;
  }

  .login-input:focus { border-color: var(--accent); }

  .login-btn {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    font-family: var(--mono);
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.85rem;
    cursor: pointer;
    font-weight: 700;
    transition: opacity 0.2s;
  }

  .login-btn:active { opacity: 0.8; }

  .login-error {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--warn);
    margin-top: 0.75rem;
    min-height: 1rem;
  }

  /* HEADER */
  #header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 0.6rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 100;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .logo {
    font-family: var(--mono);
    font-size: 0.9rem;
    color: var(--accent);
    letter-spacing: 0.2em;
  }

  .user-badge {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 0.2rem 0.6rem;
    letter-spacing: 0.1em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .active-count {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--accent2);
    letter-spacing: 0.1em;
  }

  /* STATUS BAR */
  #statusbar {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0.4rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .status-left {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-dot.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .status-dot.polling { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }

  .status-text {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .next-poll {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  /* MAP */
  #map {
    flex: 1;
    z-index: 1;
  }

  /* Leaflet overrides */
  .leaflet-container { background: #0a0c0f !important; }
  .leaflet-tile { filter: brightness(0.85) saturate(0.9); }

  /* USER DOT MARKERS */
  .user-marker {
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
  }

  .marker-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.8);
    box-shadow: 0 0 8px rgba(0,0,0,0.5);
    position: relative;
  }

  .marker-dot.stale {
    opacity: 0.45;
    filter: saturate(0.3);
  }

  .marker-pulse {
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 1px solid currentColor;
    animation: pulse 2s ease-out infinite;
    opacity: 0;
  }

  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(2.5); opacity: 0; }
  }

  .marker-label {
    font-family: var(--mono);
    font-size: 10px;
    color: #fff;
    background: rgba(0,0,0,0.75);
    padding: 1px 4px;
    margin-top: 3px;
    white-space: nowrap;
    letter-spacing: 0.05em;
    border: 1px solid rgba(255,255,255,0.15);
  }

  /* BOTTOM PANEL */
  #bottom-panel {
    background: var(--panel);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 100;
  }

  #user-list {
    display: flex;
    overflow-x: auto;
    padding: 0.5rem 0.75rem;
    gap: 0.5rem;
    scrollbar-width: none;
  }
  #user-list::-webkit-scrollbar { display: none; }

  .user-chip {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 0.3rem 0.6rem;
    flex-shrink: 0;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .user-chip:active { border-color: var(--accent); }

  .chip-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .chip-name {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--text);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .chip-time {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .chip-dot.stale { opacity: 0.4; }

  /* POPUP override */
  .leaflet-popup-content-wrapper {
    background: var(--panel) !important;
    border: 1px solid var(--border) !important;
    border-radius: 0 !important;
    color: var(--text) !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
    font-family: var(--mono) !important;
    font-size: 0.75rem !important;
  }
  .leaflet-popup-tip { background: var(--panel) !important; }
  .leaflet-popup-close-button { color: var(--muted) !important; }

  .popup-name { color: var(--accent); font-size: 0.85rem; margin-bottom: 0.3rem; }
  .popup-time { color: var(--muted); font-size: 0.7rem; }
  .popup-coords { color: var(--muted); font-size: 0.65rem; margin-top: 0.3rem; }

  /* HIDDEN */
  .hidden { display: none !important; }
</style>
</head>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD9D76172XVvBX6va61xCxZzS_T7PjWDkA",
  authDomain: "tracker-13361.firebaseapp.com",
  projectId: "tracker-13361",
  storageBucket: "tracker-13361.firebasestorage.app",
  messagingSenderId: "161479517826",
  appId: "1:161479517826:web:293f909d8f24a59451769b"
};

const MAP_CENTER     = [29.935773, 34.952498];
const MAP_ZOOM       = 15;
const POLL_INTERVAL  = 2 * 60 * 1000;
const MOVE_THRESHOLD = 20;
const STALE_AFTER    = 10 * 60 * 1000;

const COLORS = [
  '#00ff88','#00bfff','#ff6b35','#ffd700','#ff69b4',
  '#7fff00','#ff4500','#1e90ff','#ff1493','#adff2f',
  '#00ced1','#ff8c00','#9400d3','#32cd32','#dc143c',
  '#00fa9a','#4169e1','#ff6347','#48d1cc','#da70d6',
  '#f0e68c','#87ceeb','#dda0dd','#90ee90','#ffb6c1',
  '#add8e6','#ffa07a','#20b2aa','#b0c4de','#f08080',
  '#e0ffff','#fafad2','#d3d3d3','#90ee90','#ffb6c1',
  '#add8e6','#ffa07a','#20b2aa','#b0c4de','#f08080'
];

// State
let myUid = null;
let myName = null;
let myColor = null;
let lastPos = null;
let pollTimer = null;
let countdownTimer = null;
let nextPollAt = null;
let markers = {};
let userColors = {};
let colorIndex = 0;
let db, auth;

// ── MAP INIT ────────────────────────────────────────────
const map = L.map('map', {
  center: MAP_CENTER,
  zoom: MAP_ZOOM,
  zoomControl: true,
  attributionControl: false
});

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19,
  attribution: 'ESRI'
}).addTo(map);

// ── UTILS ───────────────────────────────────────────────
function haversineMeters(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function timeAgo(ms) {
  const s = Math.floor((Date.now() - ms) / 1000);
  if (s < 60) return `${s}s ago`;
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}m ago`;
  return `${Math.floor(m/60)}h ago`;
}

function assignColor(uid) {
  if (!userColors[uid]) {
    userColors[uid] = COLORS[colorIndex % COLORS.length];
    colorIndex++;
  }
  return userColors[uid];
}

// ── STATUS ──────────────────────────────────────────────
function setStatus(msg, state = 'idle') {
  document.getElementById('status-text').textContent = msg.toUpperCase();
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot';
  if (state === 'active') dot.classList.add('active');
  if (state === 'polling') dot.classList.add('polling');
}

function startCountdown() {
  nextPollAt = Date.now() + POLL_INTERVAL;
  const el = document.getElementById('next-poll');
  clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    const remaining = Math.max(0, Math.ceil((nextPollAt - Date.now()) / 1000));
    const m = Math.floor(remaining / 60);
    const s = remaining % 60;
    el.textContent = `NEXT POLL ${m}:${String(s).padStart(2,'0')}`;
    if (remaining === 0) clearInterval(countdownTimer);
  }, 1000);
}

// ── MARKER ──────────────────────────────────────────────
function createMarkerIcon(name, color, stale) {
  const staleClass = stale ? 'stale' : '';
  const html = `
    <div class="user-marker">
      <div class="marker-dot ${staleClass}" style="background:${color};color:${color};">
        ${!stale ? '<div class="marker-pulse"></div>' : ''}
      </div>
      <div class="marker-label">${name}</div>
    </div>`;
  return L.divIcon({ html, className: '', iconAnchor: [7, 7], popupAnchor: [0, -14] });
}

function updateMarker(uid, data) {
  const color = assignColor(uid);
  const stale = (Date.now() - data.ts) > STALE_AFTER;
  const icon = createMarkerIcon(data.name, color, stale);
  const latlng = [data.lat, data.lng];

  if (markers[uid]) {
    markers[uid].setLatLng(latlng).setIcon(icon);
  } else {
    const m = L.marker(latlng, { icon }).addTo(map);
    m.on('click', () => {
      const ago = timeAgo(data.ts);
      m.bindPopup(`
        <div class="popup-name">${data.name}</div>
        <div class="popup-time">Last seen: ${ago}</div>
        <div class="popup-coords">${data.lat.toFixed(5)}, ${data.lng.toFixed(5)}</div>
      `).openPopup();
    });
    markers[uid] = m;
  }
}

// ── USER LIST ───────────────────────────────────────────
let allUsers = {};

function renderUserList() {
  const list = document.getElementById('user-list');
  list.innerHTML = '';
  const sorted = Object.entries(allUsers).sort((a,b) => b[1].ts - a[1].ts);
  sorted.forEach(([uid, data]) => {
    const color = assignColor(uid);
    const stale = (Date.now() - data.ts) > STALE_AFTER;
    const chip = document.createElement('div');
    chip.className = 'user-chip';
    chip.innerHTML = `
      <div class="chip-dot ${stale?'stale':''}" style="background:${color}"></div>
      <div class="chip-name">${data.name}</div>
      <div class="chip-time">${timeAgo(data.ts)}</div>`;
    chip.addEventListener('click', () => {
      map.setView([data.lat, data.lng], 17, { animate: true });
    });
    list.appendChild(chip);
  });

  const activeCount = sorted.filter(([,d]) => (Date.now()-d.ts) < STALE_AFTER).length;
  document.getElementById('active-count').textContent = `${activeCount} ONLINE`;
}

setInterval(renderUserList, 30000);

// ── FIRESTORE LISTENER ──────────────────────────────────
function startListener() {
  const { getFirestore, collection, onSnapshot } = window.__firebaseFns;
  onSnapshot(collection(db, 'users'), (snap) => {
    snap.docChanges().forEach(change => {
      const uid = change.doc.id;
      if (change.type === 'removed') {
        if (markers[uid]) { map.removeLayer(markers[uid]); delete markers[uid]; }
        delete allUsers[uid];
        return;
      }
      const data = change.doc.data();
      if (!data.lat || !data.lng) return;
      data.ts = data.updatedAt?.toMillis?.() || Date.now();
      allUsers[uid] = data;
      updateMarker(uid, data);
    });
    renderUserList();
  });
}

// ── GPS POLL ────────────────────────────────────────────
async function pollGPS() {
  setStatus('Acquiring GPS...', 'polling');
  document.getElementById('next-poll').textContent = 'POLLING...';

  return new Promise((resolve) => {
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        const { latitude: lat, longitude: lng, accuracy } = pos.coords;

        // Check movement
        const moved = lastPos
          ? haversineMeters(lastPos.lat, lastPos.lng, lat, lng)
          : Infinity;

        const { doc, setDoc } = window.__firebaseFns;
        const userDoc = doc(db, 'users', myUid);

        if (moved > MOVE_THRESHOLD) {
          // Full update
          await setDoc(userDoc, {
            name: myName,
            lat, lng,
            accuracy: Math.round(accuracy),
            updatedAt: { seconds: Math.floor(Date.now()/1000), nanoseconds: 0 }
          }, { merge: true });
          lastPos = { lat, lng };
          setStatus(`Updated · ±${Math.round(accuracy)}m`, 'active');
        } else {
          // Heartbeat only
          await setDoc(userDoc, {
            name: myName,
            updatedAt: { seconds: Math.floor(Date.now()/1000), nanoseconds: 0 }
          }, { merge: true });
          setStatus(`Stationary · ${Math.round(moved)}m drift`, 'active');
        }

        startCountdown();
        resolve();
      },
      (err) => {
        setStatus(`GPS error: ${err.message}`, 'idle');
        startCountdown();
        resolve();
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  });
}

function schedulePoll() {
  pollGPS().then(() => {
    pollTimer = setTimeout(schedulePoll, POLL_INTERVAL);
  });
}

// ── FIREBASE INIT ───────────────────────────────────────
async function initFirebase(name) {
  const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
  const { getFirestore, doc, setDoc, onSnapshot, collection } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  const { getAuth, signInAnonymously } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");

  window.__firebaseFns = { doc, setDoc, onSnapshot, collection };

  const app = initializeApp(firebaseConfig);
  db = getFirestore(app);
  auth = getAuth(app);

  const cred = await signInAnonymously(auth);
  myUid = cred.user.uid;
  myName = name;
  myColor = assignColor(myUid);

  // Start listener
  onSnapshot(collection(db, 'users'), (snap) => {
    snap.docChanges().forEach(change => {
      const uid = change.doc.id;
      if (change.type === 'removed') {
        if (markers[uid]) { map.removeLayer(markers[uid]); delete markers[uid]; }
        delete allUsers[uid];
        return;
      }
      const data = change.doc.data();
      if (!data.lat || !data.lng) return;
      data.ts = data.updatedAt?.seconds ? data.updatedAt.seconds * 1000 : Date.now();
      allUsers[uid] = data;
      updateMarker(uid, data);
    });
    renderUserList();
  });

  // Start polling
  schedulePoll();
}

// ── LOGIN ────────────────────────────────────────────────
document.getElementById('join-btn').addEventListener('click', async () => {
  const name = document.getElementById('name-input').value.trim();
  if (!name) {
    document.getElementById('login-error').textContent = 'Enter your name to continue.';
    return;
  }
  if (name.length < 2) {
    document.getElementById('login-error').textContent = 'Name must be at least 2 characters.';
    return;
  }

  document.getElementById('join-btn').textContent = 'CONNECTING...';
  document.getElementById('join-btn').disabled = true;

  try {
    await initFirebase(name);
    document.getElementById('my-name-badge').textContent = name.toUpperCase();
    document.getElementById('login-screen').classList.add('hidden');
    setStatus('Connected', 'active');
    map.invalidateSize();
  } catch(e) {
    document.getElementById('login-error').textContent = 'Connection failed. Check Firebase config.';
    document.getElementById('join-btn').textContent = 'ENTER GRID';
    document.getElementById('join-btn').disabled = false;
  }
});

document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('join-btn').click();
});

// Handle visibility change — re-poll when tab becomes active
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && myUid) {
    clearTimeout(pollTimer);
    clearInterval(countdownTimer);
    pollGPS().then(() => {
      pollTimer = setTimeout(schedulePoll, POLL_INTERVAL);
    });
  }
});
</script>
</body>
</html>
